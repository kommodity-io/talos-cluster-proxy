replicaCount: 1

image:
  repository: ghcr.io/kommodity-io/talos-proxy
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""
  pullPolicy: IfNotPresent

# -- Address the proxy listens on
listenAddress: ":50000"

# -- Timeout for dialing upstream Talos API
dialTimeout: "5s"

# -- Comma-separated list of allowed CIDRs (empty = allow all)
allowedCIDRs: ""

# -- Comma-separated list of allowed target ports (empty = allow all)
allowedPorts: "50000"

# -- Log level (debug, info, warn, error)
logLevel: "info"

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    memory: 64Mi

# -- Node selector for pod scheduling
# Example:
#   node-role.kubernetes.io/control-plane: ""
nodeSelector: {}

# -- Tolerations for pod scheduling
# Example:
#   - key: node-role.kubernetes.io/control-plane
#     operator: Exists
#     effect: NoSchedule
tolerations: []
