suite: talos-cluster-proxy service
release:
  name: test-release
  namespace: kube-system
templates:
  - templates/service.yaml
tests:
  - it: should render a ClusterIP Service by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-release-talos-cluster-proxy
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 50000
      - equal:
          path: spec.ports[0].targetPort
          value: proxy
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: talos-cluster-proxy

  - it: should not render Service when disabled
    set:
      service.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom service type and port
    set:
      service.type: NodePort
      service.port: 30000
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 30000
