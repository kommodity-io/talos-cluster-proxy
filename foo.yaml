---
# Source: talos-proxy/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-proxy-talos-proxy
  labels:
    helm.sh/chart: talos-proxy-0.1.0
    app.kubernetes.io/name: talos-proxy
    app.kubernetes.io/instance: test-proxy
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
---
# Source: talos-proxy/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-proxy-talos-proxy
  labels:
    helm.sh/chart: talos-proxy-0.1.0
    app.kubernetes.io/name: talos-proxy
    app.kubernetes.io/instance: test-proxy
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: talos-proxy
      app.kubernetes.io/instance: test-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: talos-proxy
        app.kubernetes.io/instance: test-proxy
    spec:
      serviceAccountName: test-proxy-talos-proxy
      hostNetwork: false
      containers:
        - name: talos-proxy
          image: ghcr.io/kommodity-io/talos-proxy:latest
          imagePullPolicy: IfNotPresent
          args:
            - --listen-address=:50000
            - --dial-timeout=5s
          ports:
            - containerPort: 50000
              name: proxy
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 50000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 50000
            periodSeconds: 5
          resources:
            limits:
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
